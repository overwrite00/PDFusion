version: 2
updates:
  # Python dependencies via pip
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "lang:python"
      - "scope:core"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-updates:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # PyQt6 6.11.0+ has GUI test incompatibility (test_open_file_updates_window_title hangs).
      # Block until resolution. See PR #29 and CLAUDE.md for details.
      - dependency-name: "PyQt6"
        versions: [">=6.11.0"]
      # Dev-only deps: block majors, keep production deps fully updated.
      # `ignore` does not support `dependency-type`, so dev deps are named explicitly.
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pytest-qt"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pytest-cov"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pytest-timeout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "psutil"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ruff"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mypy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "isort"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pyinstaller"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — no major version ignore (CI/CD security-critical)
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    labels:
      - "dependencies"
      - "type:ci"
      - "scope:deps"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
