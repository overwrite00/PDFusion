name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "CLAUDE.md"
      - ".gitignore"
      - "**/*.md"
  pull_request:
    branches: [develop]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "CLAUDE.md"
      - ".gitignore"
      - "**/*.md"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (Linux — headless Qt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglvnd0 libegl1 libglib2.0-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libx11-6 libxext6 libxcb-xkb1 \
            libfreetype6 libfontconfig1 libharfbuzz0b \
            libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Linux runners have no real display. Instead of the fragile xcb+xvfb
      # combo (which aborts with SIGABRT even under xvfb on these runners),
      # we use Qt's "offscreen" platform plugin: it renders to an in-memory
      # buffer, needs no display server, and lets every Qt test run.
      - name: Run tests (Linux — headless)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v --tb=short

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest tests/ -v --tb=short
