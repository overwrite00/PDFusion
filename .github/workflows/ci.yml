name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "CLAUDE.md"
      - ".gitignore"
      - "**/*.md"
  pull_request:
    branches: [develop]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "CLAUDE.md"
      - ".gitignore"
      - "**/*.md"

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      # Install the SAME pinned ruff used locally so CI and developers agree on
      # the rule set. An unpinned `pip install ruff` pulls the latest release,
      # which can introduce new lint rules and fail CI on code that passes
      # locally (or vice-versa).
      - run: pip install -r requirements-dev.txt
      - run: ruff check src/ tests/

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system deps (Linux — headless Qt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglvnd0 libegl1 libglib2.0-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libxcb-cursor0 libx11-6 libxext6 libxcb-xkb1 \
            libfreetype6 libfontconfig1 libharfbuzz0b \
            libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Linux runners have no real display. Instead of the fragile xcb+xvfb
      # combo (which aborts with SIGABRT even under xvfb on these runners),
      # we use Qt's "offscreen" platform plugin: it renders to an in-memory
      # buffer, needs no display server, and lets every Qt test run.
      - name: Run tests (Linux — headless)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v --tb=short

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest tests/ -v --tb=short
