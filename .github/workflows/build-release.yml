name: Build release (main)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # solo tag stabili: v0.1.0, v1.2.3, ecc.

jobs:
  # -----------------------------------------------------------------------
  # Windows — NSIS installer .exe
  # -----------------------------------------------------------------------
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        run: pyinstaller PDFusion.spec --noconfirm

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Stage PyInstaller output for NSIS
        shell: pwsh
        run: |
          $staging = "installer\windows\dist_staging"
          if (Test-Path "$staging") { Remove-Item "$staging" -Recurse -Force }
          Copy-Item "dist\PDFusion" -Destination "$staging" -Recurse
          Write-Host "✓ Staged files:"
          Get-ChildItem "$staging" | Select-Object -ExpandProperty Name

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $distAbsolute = (Resolve-Path "installer\windows\dist_staging").Path
          $nsiAbsolute = (Resolve-Path "installer\windows\installer.nsi").Path
          Write-Host "DIST_DIR resolved to: $distAbsolute"
          Write-Host "NSI file resolved to: $nsiAbsolute"
          & "C:\Program Files (x86)\NSIS\makensis.exe" "/DDIST_DIR=$distAbsolute" "/DVERSION=$version" "$nsiAbsolute"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Windows installer exists
        shell: pwsh
        run: |
          $file = Get-ChildItem "installer\windows\PDFusion-*-windows-setup.exe" -ErrorAction SilentlyContinue
          if (-not $file) {
            Write-Error "❌ Windows installer not found"
            exit 1
          }
          Write-Host "✓ Found: $($file.Name) ($([math]::Round($file.Length/1MB, 2)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFusion-${{ github.ref_name }}-windows-setup
          path: installer/windows/PDFusion-*-windows-setup.exe
          retention-days: 5

  # -----------------------------------------------------------------------
  # Linux — AppImage
  # -----------------------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglvnd0 libegl1 libglib2.0-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxkbcommon-x11-0 libxkbcommon0 \
            libx11-6 libxext6 libxcb-xkb1 \
            libfreetype6 libfontconfig1 libharfbuzz0b libdbus-1-3 \
            fuse libfuse2 xvfb

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        run: |
          xvfb-run --auto-servernum pyinstaller PDFusion.spec --noconfirm

      - name: Download AppImageTool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: bash installer/linux/build_appimage.sh "${{ github.ref_name }}"

      - name: Verify Linux AppImage exists
        run: |
          if ! ls installer/linux/PDFusion-*-linux.AppImage 1>/dev/null 2>&1; then
            echo "❌ Linux AppImage not found"
            exit 1
          fi
          ls -lh installer/linux/PDFusion-*-linux.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFusion-${{ github.ref_name }}-linux
          path: installer/linux/PDFusion-*-linux.AppImage
          retention-days: 5

  # -----------------------------------------------------------------------
  # macOS — .dmg
  # -----------------------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        run: pyinstaller PDFusion.spec --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Sign app (conditional)
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: bash installer/macos/sign.sh

      - name: Build DMG
        run: bash installer/macos/create_dmg.sh "${{ github.ref_name }}"

      - name: Verify macOS DMG exists
        run: |
          if ! ls installer/macos/PDFusion-*-macos.dmg 1>/dev/null 2>&1; then
            echo "❌ macOS DMG not found"
            exit 1
          fi
          ls -lh installer/macos/PDFusion-*-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFusion-${{ github.ref_name }}-macos
          path: installer/macos/PDFusion-*-macos.dmg
          retention-days: 5

  # -----------------------------------------------------------------------
  # Crea la release stabile su GitHub
  # -----------------------------------------------------------------------
  create-release:
    name: Create stable release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN="${VERSION#v}"

          # Check CHANGELOG.md exists
          if [ ! -f CHANGELOG.md ]; then
            echo "⚠️  CHANGELOG.md not found, using generic release notes"
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "See commit history for changes in this release." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract notes for this version
          NOTES=$(awk "/^## \[$VERSION_CLEAN\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          # If version not found, use fallback
          if [ -z "$NOTES" ]; then
            echo "⚠️  No CHANGELOG entry for version $VERSION_CLEAN, using generic notes"
            NOTES="See commit history for changes in this release."
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: "PDFusion ${{ github.ref_name }}"
          body: |
            ## Novità in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### Download
            | Sistema | File |
            |---|---|
            | **Windows 10/11** | `PDFusion-*-windows-setup.exe` |
            | **Linux** | `PDFusion-*-linux.AppImage` |
            | **macOS 12+** | `PDFusion-*-macos.dmg` |

            > **macOS**: se l'app non è firmata, fare tasto destro → "Apri" al primo avvio.
          files: dist/**/*
