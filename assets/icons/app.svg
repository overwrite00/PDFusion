<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#F5F4F1"/>

  <!-- Main circle accent -->
  <circle cx="128" cy="128" r="88" fill="#4A6FA5"/>

  <!-- PDF icon "P" shape -->
  <rect x="90" y="100" width="76" height="100" fill="#F5F4F1"/>

  <!-- Document lines (representing PDF pages) -->
  <line x1="110" y1="140" x2="146" y2="140" stroke="#4A6FA5" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="160" x2="146" y2="160" stroke="#4A6FA5" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="180" x2="130" y2="180" stroke="#4A6FA5" stroke-width="3" stroke-linecap="round"/>
</svg>